# Fly.io — https://fly.io/docs/reference/configuration/
# If launch still errors, run: flyctl launch --region ord --no-deploy

app = "relevant-priors-zuhayr"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PRIMARY_REGION = "ord"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
